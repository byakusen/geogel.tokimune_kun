<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時宗くん 〜鎌倉ものしり問答〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Maru+Gothic:wght@500;700;900&family=Klee+One:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#1a1410;       /* 墨 */
    --sumi2:#241c15;
    --kin:#d9a441;        /* 金 */
    --kin-akarui:#f2cd6b;
    --aka:#b03a2e;        /* 朱 */
    --aka-fuka:#7d241c;
    --washi:#f4ead6;      /* 和紙 */
    --washi-kage:#e7d8ba;
    --midori:#5c7a4a;
    --sumi-usu:rgba(244,234,214,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #3a2c1d 0%, transparent 55%),
      radial-gradient(ellipse at 50% 120%, #2a1d12 0%, transparent 55%),
      var(--sumi);
    color:var(--washi);
    min-height:100%;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
  }
  /* 和紙テクスチャ風のノイズ */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    pointer-events:none;z-index:0;
  }

  /* ヘッダー（のぼり旗風） */
  header{
    position:relative;z-index:2;
    text-align:center;
    padding:18px 16px 10px;
    border-bottom:3px solid var(--kin);
    background:linear-gradient(180deg, rgba(125,36,28,.35), transparent);
  }
  .mon{
    display:inline-flex;align-items:center;gap:14px;
  }
  .mon-maru{
    width:46px;height:46px;border-radius:50%;
    border:3px solid var(--kin);
    display:grid;place-items:center;
    font-family:'Yuji Syuku',serif;font-size:24px;color:var(--kin-akarui);
    background:radial-gradient(circle,#3a2c1d,#1a1410);
  }
  h1{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(28px,4.2vw,52px);
    color:var(--kin-akarui);
    letter-spacing:.12em;
    text-shadow:0 2px 0 #000,0 0 18px rgba(217,164,65,.35);
  }
  .sub{
    font-size:clamp(13px,1.5vw,18px);
    color:var(--sumi-usu);
    margin-top:4px;letter-spacing:.18em;
  }

  /* メイン舞台 */
  main{
    position:relative;z-index:2;
    flex:1;
    width:min(1100px,94vw);
    margin:0 auto;
    padding:22px 0 30px;
    display:flex;flex-direction:column;gap:20px;
  }

  /* 時宗の語り場 */
  .stage{
    display:flex;align-items:flex-start;gap:22px;
  }
  .tokimune{
    flex:0 0 auto;
    width:clamp(120px,15vw,180px);
    text-align:center;
  }
  .face{
    width:clamp(120px,15vw,180px);
    height:clamp(120px,15vw,180px);
    border-radius:50%;
    overflow:hidden;
    background:#241c15;
    border:5px solid var(--kin);
    box-shadow:0 0 0 4px var(--sumi),0 10px 30px rgba(0,0,0,.5);
    position:relative;
    transition:transform .25s;
  }
  .face .mouth{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .face .mouth.closed{z-index:1;}
  .face .mouth.open{z-index:2;opacity:0;}   /* ふだんは閉じた口。話すとき重ねて見せる */
  .face.talking-open .mouth.open{opacity:1;}
  .face.no-img .mouth{display:none;}
  .face-fallback{
    display:none;
    position:absolute;inset:0;z-index:3;
    width:100%;height:100%;
    align-items:center;justify-content:center;
    font-family:'Yuji Syuku',serif;
    font-size:clamp(20px,2.6vw,32px);line-height:1.15;
    color:var(--kin-akarui);letter-spacing:.05em;
    background:radial-gradient(circle at 50% 38%, #3a2c1d, #1a1410);
  }
  .face.no-img .face-fallback{display:flex;}
  .face.talk{} /* 話し始めの顔の動きはなし（うなずき・傾きとも無効） */
  .name-tag{
    margin-top:10px;font-family:'Yuji Syuku',serif;
    font-size:clamp(16px,2vw,24px);color:var(--kin-akarui);letter-spacing:.1em;
  }

  /* 吹き出し（巻物風） */
  .scroll{
    flex:1;position:relative;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);
    border-radius:14px;
    padding:26px 30px;
    min-height:170px;
    box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 0 0 3px rgba(125,36,28,.25);
    border:2px solid var(--kin);
  }
  .scroll::before{ /* 吹き出しのしっぽ */
    content:"";position:absolute;left:-18px;top:48px;
    border-style:solid;border-width:14px 18px 14px 0;
    border-color:transparent var(--kin) transparent transparent;
  }
  .scroll .answer{
    font-family:'Klee One',serif;
    font-size:clamp(20px,2.6vw,32px);
    line-height:1.75;font-weight:600;
    letter-spacing:.02em;
  }
  .scroll .answer .em{color:var(--aka-fuka);font-weight:700;}
  .cursor{display:inline-block;width:2px;height:1.05em;vertical-align:-0.12em;margin:0 1px;background:var(--sumi);animation:blink .7s steps(1) infinite;}
  @keyframes blink{50%{opacity:0}}

  /* 質問エリア */
  .ask-zone{
    background:rgba(36,28,21,.7);
    border:2px solid var(--kin);
    border-radius:14px;
    padding:18px 20px;
  }
  .ask-zone .label{
    font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);
    margin-bottom:12px;letter-spacing:.1em;font-weight:700;
  }
  .input-row{display:flex;gap:12px;flex-wrap:wrap;}
  #q{
    flex:1;min-width:220px;
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:clamp(18px,2.2vw,26px);font-weight:500;
    padding:14px 18px;border-radius:10px;border:none;
    background:var(--washi);color:var(--sumi);
  }
  #q:focus{outline:3px solid var(--kin-akarui);}
  .btn-ask{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(18px,2.2vw,26px);
    padding:14px 28px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aka),var(--aka-fuka));
    color:var(--washi);letter-spacing:.1em;
    box-shadow:0 4px 0 #511712,0 6px 14px rgba(0,0,0,.4);
    transition:transform .08s;
  }
  .btn-ask:active{transform:translateY(4px);box-shadow:0 1px 0 #511712;}

  /* おすすめ問い */
  .topics{margin-top:8px;}
  .topics .t-label{font-size:clamp(13px,1.5vw,17px);color:var(--sumi-usu);margin:6px 2px 12px;letter-spacing:.08em;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:clamp(15px,1.8vw,21px);
    padding:11px 18px;border-radius:999px;cursor:pointer;
    background:rgba(244,234,214,.08);
    color:var(--washi);
    border:2px solid var(--kin);
    transition:all .15s;
  }
  .chip:hover{background:var(--kin);color:var(--sumi);transform:translateY(-2px);}

  .panel{display:none;}
  .panel.show{display:block;}

  /* タブ */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;}
  .tab{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(15px,1.9vw,22px);
    padding:11px 22px;cursor:pointer;
    border:2px solid var(--kin);border-bottom:none;
    border-radius:12px 12px 0 0;
    background:rgba(36,28,21,.55);color:var(--washi);
    letter-spacing:.08em;
    transition:all .12s;
  }
  .tab:hover{background:rgba(217,164,65,.25);}
  .tab.active{background:var(--kin);color:var(--sumi);}
  .panel{border-top:2px solid var(--kin);padding-top:2px;margin-top:-2px;}

  /* クイズ */
  .quiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .quiz-count{font-family:'Yuji Syuku',serif;font-size:clamp(17px,2vw,24px);color:var(--kin-akarui);letter-spacing:.06em;}
  .quiz-score{font-size:clamp(14px,1.6vw,19px);color:var(--washi);}
  .quiz-score b{color:var(--kin-akarui);font-size:1.25em;}
  .quiz-q{
    font-family:'Klee One',serif;font-weight:600;
    font-size:clamp(18px,2.3vw,27px);line-height:1.6;
    color:var(--washi);margin-bottom:16px;
  }
  .choices{display:flex;flex-direction:column;gap:11px;}
  .choice{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;text-align:left;
    font-size:clamp(16px,2vw,23px);
    padding:14px 18px;border-radius:12px;cursor:pointer;
    background:var(--washi);color:var(--sumi);
    border:3px solid transparent;
    transition:all .12s;
  }
  .choice:hover:not(:disabled){background:#fff;transform:translateX(4px);}
  .choice:disabled{cursor:default;}
  .choice.correct{background:#dff0d2;border-color:var(--midori);color:#2f4a1e;}
  .choice.wrong{background:#f5d6d0;border-color:var(--aka);color:var(--aka-fuka);}
  .choice .mark{font-family:'Yuji Syuku',serif;margin-right:10px;}
  .quiz-next,.quiz-retry{
    margin-top:16px;display:none;
    font-family:'Yuji Syuku',serif;font-size:clamp(16px,2vw,23px);
    padding:12px 26px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aka),var(--aka-fuka));
    color:var(--washi);letter-spacing:.1em;
    box-shadow:0 4px 0 #511712;
  }
  .quiz-next.show,.quiz-retry.show{display:inline-block;}
  .quiz-result{text-align:center;}
  .quiz-result .big{font-family:'Yuji Syuku',serif;font-size:clamp(26px,4vw,46px);color:var(--kin-akarui);margin:10px 0;}
  .quiz-result .msg{font-size:clamp(16px,2vw,23px);line-height:1.7;margin-bottom:6px;}

  /* 年表 */
  .tl-label{font-size:clamp(14px,1.6vw,19px);color:var(--kin-akarui);margin-bottom:12px;letter-spacing:.06em;}
  .timeline{display:flex;gap:14px;overflow-x:auto;padding:6px 2px 16px;scroll-snap-type:x mandatory;}
  .tl-card{
    scroll-snap-align:start;flex:0 0 auto;width:clamp(150px,40vw,200px);
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);border:2px solid var(--kin);border-radius:12px;
    padding:14px 16px;cursor:pointer;text-align:center;
    box-shadow:0 6px 16px rgba(0,0,0,.35);transition:transform .12s;
  }
  .tl-card:hover{transform:translateY(-4px);}
  .tl-card.active{outline:3px solid var(--kin-akarui);}
  .tl-year{font-family:'Yuji Syuku',serif;font-size:clamp(20px,2.6vw,30px);color:var(--aka-fuka);}
  .tl-age{font-size:clamp(12px,1.4vw,15px);color:#7d6a4a;margin:2px 0 8px;}
  .tl-title{font-family:'Klee One',serif;font-weight:600;font-size:clamp(15px,1.8vw,20px);line-height:1.45;}

  /* 元寇マップ */
  .map-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .map-btn{
    font-family:'Yuji Syuku',serif;font-size:clamp(14px,1.7vw,20px);
    padding:9px 18px;border-radius:999px;cursor:pointer;
    background:rgba(244,234,214,.08);color:var(--washi);
    border:2px solid var(--kin);transition:all .12s;
  }
  .map-btn:hover{background:rgba(217,164,65,.25);}
  .map-btn.active{background:var(--kin);color:var(--sumi);}
  .map-hint{font-size:clamp(13px,1.5vw,17px);color:var(--sumi-usu);letter-spacing:.04em;}
  #map-wrap{
    background:#d3e3ea; /* 海 */
    border:2px solid var(--kin);border-radius:12px;
    width:100%;overflow:hidden;
  }
  #japan-map{width:100%;height:auto;display:block;}
  #japan-map .prefecture polygon,#japan-map .prefecture path{
    fill:#efe6d0;stroke:#8a7350;stroke-width:1;stroke-linejoin:round;
  }
  #japan-map .prefecture[data-region="九州"] polygon,
  #japan-map .prefecture[data-region="九州"] path{fill:#f0c074;}
  .map-pin{cursor:pointer;}
  .map-pin circle{fill:var(--aka);stroke:#fff;stroke-width:1.5;}
  .map-pin.wall circle{fill:#3a5a8a;}
  .map-pin.home circle{fill:var(--midori);}
  .map-pin.active circle{fill:var(--kin);stroke:var(--aka-fuka);}
  .map-pin text{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;fill:#2b1d12;paint-order:stroke;stroke:#fff;stroke-width:3px;text-anchor:middle;}
  .map-route{fill:none;stroke:var(--aka);stroke-dasharray:5 4;opacity:.8;}

  /* 顔のリアクション */
  .face.seikai{box-shadow:0 0 0 4px var(--sumi),0 0 34px 6px rgba(217,164,65,.85),0 10px 30px rgba(0,0,0,.5);}

  footer{
    position:relative;z-index:2;text-align:center;
    font-size:13px;color:rgba(244,234,214,.4);
    padding:14px;letter-spacing:.1em;
  }
  @media(max-width:560px){
    .stage{flex-direction:column;align-items:center;}
    .scroll::before{display:none;}
    .tokimune{order:-1;}
  }
</style>
</head>
<body>
  <header>
    <div class="mon">
      <span class="mon-maru">北</span>
      <div>
        <h1>時宗くん</h1>
        <div class="sub">かまくら ものしり もんどう</div>
      </div>
      <span class="mon-maru">条</span>
    </div>
  </header>

  <main>
    <div class="stage">
      <div class="tokimune">
        <div class="face" id="face">
          <img class="mouth closed" src="https://raw.githubusercontent.com/byakusen/geogel.tokimune_kun/main/tokimune.png" alt="北条時宗"
               onerror="this.closest('.face').classList.add('no-img');">
          <img class="mouth open" src="https://raw.githubusercontent.com/byakusen/geogel.tokimune_kun/main/tokimune2.png" alt="" aria-hidden="true">
          <span class="face-fallback">北<br>条<br>時<br>宗</span>
        </div>

      </div>
      <div class="scroll">
        <div class="answer" id="answer"></div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="qa">もんどう</div>
      <div class="tab" data-tab="quiz">時宗クイズ</div>
      <div class="tab" data-tab="timeline">年表</div>
      <div class="tab" data-tab="map">元寇マップ</div>
    </div>

    <div class="panel show" id="panel-qa">
      <div class="ask-zone">
        <div class="label">▼ 時宗くんに きいてみよう</div>
        <div class="input-row">
          <input id="q" type="text" placeholder="しつもんを 入力してね（れい：元寇ってなに？）" autocomplete="off">
          <button class="btn-ask" id="askBtn">きく</button>

    </div>

    <div class="panel" id="panel-quiz">

        <div class="choices" id="choices"></div>
        <div id="quizResult" class="quiz-result"></div>

        <button class="quiz-retry" id="quizRetry">もう一度いどむ</button>

    </div>

    <div class="panel" id="panel-timeline">
      <div class="ask-zone">
        <div class="tl-label">▼ 年表の札をタップすると、時宗がそのできごとを語るぞ</div>
        <div class="timeline" id="timeline"></div>
      </div>
    </div>

    <div class="panel" id="panel-map">
      <div class="ask-zone">
        <div class="map-tools">
          <button class="map-btn active" data-view="kyushu">九州（戦いの場）</button>
          <button class="map-btn" data-view="zenkoku">全国（鎌倉との距離）</button>

// 入力にいちばん合う答えをさがす
function findAnswer(text){
  const t = (text||"").replace(/\s/g,"");
  if(!t) return null;
  let best=null, bestScore=0;
  for(const item of KB){
    let score=0;
    for(const k of item.keys){ if(t.includes(k)) score += k.length; }
    if(score>bestScore){bestScore=score; best=item;}
  }
  return bestScore>0 ? best.a : null;
}

const answerEl = document.getElementById('answer');
const faceEl = document.getElementById('face');
let typing=null;
let mouthTimer=null;
function startMouth(){
  stopMouth();
  // 口を開いた絵と閉じた絵をすばやく切り替えて「ぱくぱく」させる
  mouthTimer=setInterval(()=>{ faceEl.classList.toggle('talking-open'); },130);
}
function stopMouth(){
  if(mouthTimer){ clearInterval(mouthTimer); mouthTimer=null; }
  faceEl.classList.remove('talking-open'); // 話し終わりは口を閉じた絵にもどす
}
function speak(text, mood){
  faceEl.classList.remove('talk','seikai','zannen'); void faceEl.offsetWidth;
  faceEl.classList.add(mood || 'talk');
  startMouth();
  if(typing) clearInterval(typing);
  answerEl.innerHTML="";
  let i=0;
  typing=setInterval(()=>{
    if(i>=text.length){clearInterval(typing); stopMouth(); return;}
    answerEl.appendChild(document.createTextNode(text[i]));
    i++;
  },32);
}

function handleAsk(text){
  const a = findAnswer(text);
  if(a){ speak(a); }
  else{ speak(NOT_FOUND[Math.floor(Math.random()*NOT_FOUND.length)]); }
}

  elChoices.innerHTML="";
  // 選択肢もシャッフル
  const order=shuffle(q.c.map((_,i)=>i));
  order.forEach(ci=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.textContent=q.c[ci];
    btn.onclick=()=>answer(btn,ci,q);
    elChoices.appendChild(btn);
  });
}
function answer(btn,ci,q){
  if(quizAnswered)return;
  quizAnswered=true;quizDone++;
  const buttons=elChoices.querySelectorAll('.choice');
  buttons.forEach(b=>b.disabled=true);
  if(ci===q.a){
    quizRight++;
    btn.classList.add('correct');
    btn.innerHTML='<span class="mark">○</span>'+q.c[ci];
    speak("せいかい！　"+q.e,'seikai');
  }else{
    btn.classList.add('wrong');
    btn.innerHTML='<span class="mark">✕</span>'+q.c[ci];
    // 正解にも印
    buttons.forEach(b=>{ if(b.textContent===q.c[q.a]){ b.classList.add('correct'); b.innerHTML='<span class="mark">○</span>'+q.c[q.a]; } });
    speak("ざんねん。正しくは「"+q.c[q.a]+"」だ。"+q.e);
  }
  elQuizRight.textContent=quizRight;
  elQuizDone.textContent=quizDone;
  if(quizIdx<QUIZ.length-1) elQuizNext.classList.add('show');
  else elQuizNext.classList.remove('show'), showResult();
}
function showResult(){
  const total=QUIZ.length;
  let msg;
  if(quizRight===total) msg="あっぱれ！　全問正解じゃ。そなたは元寇博士よ！";
  else if(quizRight>=total*0.8) msg="みごとな出来だ。よく学んでおるな。";
  else if(quizRight>=total*0.5) msg="なかなかよいぞ。あと少し、年表ももう一度見てみよ。";
  else msg="まだまだこれからだ。もんどうや年表で学んで、また挑戦してくれ。";
  elQuizResult.innerHTML='<div class="big">'+quizRight+' / '+total+' 問 正解！</div><div class="msg">'+msg+'</div>';
  elQuizRetry.classList.add('show');
  speak("これで全"+total+"問おわりだ。"+quizRight+"問正解。"+msg);
}
elQuizNext.onclick=()=>{ quizIdx++; renderQuestion(); };
elQuizRetry.onclick=()=>{ startQuiz(); speak("よし、もう一度いどむか。その意気だ！"); };

const elTimeline=document.getElementById('timeline');

renderTimeline();

// 印の位置はSVG（viewBox 0 0 1000 1000）上のだいたいの目安。
const MAP_PINS = [
  {id:"korea", view:"kyushu", x:-12, y:702, label:"高麗", cls:"", d:"海のむこう、朝鮮半島には高麗（こうらい）があった。元に従わされた高麗で軍船がつくられ、元軍はここから海をわたって日本へ向かったのだ。"},

  {id:"wall", view:"kyushu", x:104, y:773, label:"防塁", cls:"wall", d:"文永の役のあと、わたしはこの博多湾の海ぞいに石の壁『防塁（ぼうるい）』を築かせた。おかげで二度目の弘安の役では、元軍は上陸できなかったのだ。"},

  {id:"hakata2", view:"zenkoku", x:118, y:788, label:"博多", cls:"", d:"九州の博多（はかた）が、元軍がせめてきた最前線だ。鎌倉からは遠くはなれている。だからこそ、現地の御家人たちの働きが何より頼りであった。"}
];
// 高麗→対馬→壱岐→博多 の進路
const ROUTE = "-12,702 50,734 86,761 116,786";

const REGION_VIEWBOXES = { zenkoku:[0,0,1000,1000], kyushu:[-37.5,695,272,272] };
const VIEW_STYLE = { zenkoku:{r:8,font:17,route:0,offset:13}, kyushu:{r:3.2,font:7.5,route:1.3,offset:5} };
const svgMap=document.getElementById('japan-map');
let mapView="kyushu", mapRendered=false, prefDone=false;

function assignRegions(){
  if(prefDone||!svgMap)return; prefDone=true;
  // data-code の九州各県に data-region="九州" を付ける（色分け用）
  const kyushuCodes=[40,41,42,43,44,45,46];
  svgMap.querySelectorAll('.prefecture').forEach(el=>{
    const code=+el.dataset.code;
    if(kyushuCodes.includes(code)) el.setAttribute('data-region','九州');
  });
}
function drawMap(){
  if(!svgMap)return;
  assignRegions();
  svgMap.setAttribute('viewBox', REGION_VIEWBOXES[mapView].join(' '));
  // 既存レイヤー削除
  const old=svgMap.querySelector('#genko-layer'); if(old) old.remove();
  const NS="http://www.w3.org/2000/svg";
  const g=document.createElementNS(NS,'g'); g.setAttribute('id','genko-layer');
  const st=VIEW_STYLE[mapView];
  // 進路（九州のみ）
  if(mapView==="kyushu" && st.route>0){
    const pl=document.createElementNS(NS,'polyline');
    pl.setAttribute('class','map-route');
    pl.setAttribute('points',ROUTE);
    pl.setAttribute('stroke-width',st.route);
    g.appendChild(pl);
  }
  // 全国のときは鎌倉と博多を結ぶ線
  if(mapView==="zenkoku"){
    const pl=document.createElementNS(NS,'line');
    pl.setAttribute('class','map-route');
    pl.setAttribute('x1',118);pl.setAttribute('y1',788);
    pl.setAttribute('x2',583);pl.setAttribute('y2',679);
    pl.setAttribute('stroke-width',2.5);
    g.appendChild(pl);
  }
  MAP_PINS.filter(p=>p.view===mapView).forEach(p=>{
    const pin=document.createElementNS(NS,'g');
    pin.setAttribute('class','map-pin '+p.cls); pin.dataset.id=p.id;
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r',st.r);
    const t=document.createElementNS(NS,'text');
    t.setAttribute('x',p.x);t.setAttribute('y',p.y - st.r - st.offset*0.4);
    t.setAttribute('font-size',st.font);
    t.textContent=p.label;
    pin.appendChild(c);pin.appendChild(t);
    pin.addEventListener('click',()=>{
      svgMap.querySelectorAll('.map-pin').forEach(x=>x.classList.remove('active'));
      pin.classList.add('active');
      speak(p.d);
    });
    g.appendChild(pin);
  });
  svgMap.appendChild(g);
}
function ensureMapRendered(){ if(!mapRendered){ mapRendered=true; drawMap(); } }
document.querySelectorAll('.map-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.map-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mapView=btn.dataset.view;
    document.getElementById('mapHint').textContent =
      mapView==="kyushu" ? "▼ 赤い印をタップ！　元軍は高麗→対馬→壱岐→博多とせめてきたぞ"
                         : "▼ 緑が鎌倉、赤が博多。これほど遠くはなれた地を、わたしは守ったのだ";
    drawMap();
  });
});
